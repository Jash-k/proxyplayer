# ─────────────────────────────────────────────────────────────────────────────
# Render.com Deployment Configuration — JioStar Stream Player
# Full-stack: Node.js proxy server + React frontend (served from /dist)
# ─────────────────────────────────────────────────────────────────────────────

services:
  - name: jiostar-player
    type: web
    runtime: node
    region: singapore          # closest to India — lower latency for stream proxying
    plan: free                 # upgrade to starter ($7/mo) for always-on

    # ── Build ──────────────────────────────────────────────────────────────
    buildCommand: |
      npm install &&
      npm run build &&
      cd server && npm install --production

    # ── Start ──────────────────────────────────────────────────────────────
    startCommand: node server/index.js

    # ── Health check ────────────────────────────────────────────────────────
    healthCheckPath: /api/health

    # ── Environment variables ────────────────────────────────────────────────
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: M3U_SOURCE
        value: https://pocket-tv-tamil-5afe35.gitlab.io/jiostar.m3u
      # Set to true to allow ALL origins (not recommended for production)
      - key: ALLOW_ALL_ORIGINS
        value: "true"
      # Render sets this automatically — used for CORS and self-referential loop detection
      - key: RENDER_EXTERNAL_HOSTNAME
        fromEnvironment: RENDER_EXTERNAL_HOSTNAME
      # Set SERVER_BASE_URL to your Render service URL after first deploy, e.g.:
      # https://jiostar-player.onrender.com
      - key: SERVER_BASE_URL
        sync: false   # set manually in Render dashboard after first deploy
